name: TBox
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  provider: ^6.1.5+1
  http: ^1.6.0
  package_info_plus: ^9.0.0
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  url_launcher: ^6.3.2
  flutter_secure_storage: ^10.0.0
  local_auth: ^3.0.1
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/fast-delivery.png"
  adaptive_icon_background: "#FFFFFF"
  web:
    generate: true

flutter:
  uses-material-design: true

  assets:
    - assets/icon/fast-delivery.png
